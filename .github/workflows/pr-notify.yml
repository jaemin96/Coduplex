name: PR Review Notification

on:
  pull_request:
    type: [opened, synchronize, reopened]
    paths: ["apps/web-playground/**", "pnpm-lock.yaml"]
  workflow_dispatch:

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10

jobs:
  pr-check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 전체 히스토리 가져오기 (diff 비교용)

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # [Lint]
      - name: Lint web-playground
        id: lint
        run: pnpm lint
        working-directory: apps/web-playground
        continue-on-error: true

      # [Build]
      - name: Build web-playground
        id: build
        run: pnpm build
        working-directory: apps/web-playground
        continue-on-error: true

      # [변경된 파일 목록 가져오기]
      - name: Get changed files
        id: changed_files
        run: |
          # PR의 base와 head 비교
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep '^apps/web-playground')

          # 파일 개수 세기
          FILE_COUNT=$(echo "$CHANGED_FILES" | wc -l)

          # 처음 10개 파일만 (너무 많으면 줄이기)
          DISPLAY_FILES=$(echo "$CHANGED_FILES" | head -10)

          # 각 파일의 변경 통계 (추가/삭제 라인)
          STATS=$(git diff --stat ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- apps/web-playground)

          # 출력 변수 설정 (개행 처리)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$DISPLAY_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "count=$FILE_COUNT" >> $GITHUB_OUTPUT

          echo "stats<<EOF" >> $GITHUB_OUTPUT
          echo "$STATS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # [간단한 diff 내용 추출]
      - name: Get code diff summary
        id: diff_summary
        run: |
          # 변경된 파일 목록 가져오기
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- apps/web-playground)

          # 임시 파일에 diff 요약 작성
          SUMMARY_FILE=$(mktemp)

          COUNT=0
          while IFS= read -r file; do
            if [ $COUNT -ge 2 ]; then
              break
            fi

            if [ -n "$file" ]; then
              # 파일명 추가
              echo "" >> "$SUMMARY_FILE"
              echo "**${file}**" >> "$SUMMARY_FILE"
              echo '```diff' >> "$SUMMARY_FILE"

              # 해당 파일의 diff (15줄 제한)
              git diff ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- "$file" | head -15 >> "$SUMMARY_FILE"

              echo '```' >> "$SUMMARY_FILE"

              COUNT=$((COUNT + 1))
            fi
          done <<< "$CHANGED_FILES"

          # 파일 크기 체크 (Discord embed field는 1024자 제한)
          FILE_SIZE=$(wc -c < "$SUMMARY_FILE")
          if [ $FILE_SIZE -gt 900 ]; then
            # 900자로 자르고 메시지 추가
            head -c 850 "$SUMMARY_FILE" > "${SUMMARY_FILE}.tmp"
            echo '```' >> "${SUMMARY_FILE}.tmp"
            echo "" >> "${SUMMARY_FILE}.tmp"
            echo "*Diff too long, check PR for full changes*" >> "${SUMMARY_FILE}.tmp"
            mv "${SUMMARY_FILE}.tmp" "$SUMMARY_FILE"
          fi

          # GITHUB_OUTPUT에 안전하게 저장
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          cat "$SUMMARY_FILE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          rm -f "$SUMMARY_FILE"

      # [Discord 알림]
      - name: Send PR notification to Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # 상태 체크
          if [ "${{ steps.lint.outcome }}" == "failure" ] || [ "${{ steps.build.outcome }}" == "failure" ]; then
            COLOR=15158332
            STATUS_EMOJI="⚠️"
          else
            COLOR=3447003
            STATUS_EMOJI="🔍"
          fi

          # Lint/Build 상태 설정
          if [ "${{ steps.lint.outcome }}" == "success" ]; then
            LINT_STATUS="✅ Passed"
          else
            LINT_STATUS="❌ Failed"
          fi

          if [ "${{ steps.build.outcome }}" == "success" ]; then
            BUILD_STATUS="✅ Passed"
          else
            BUILD_STATUS="❌ Failed"
          fi

          # 변경 파일 목록 (간단하게)
          FILE_COUNT="${{ steps.changed_files.outputs.count }}"

          # 변경 파일을 간단한 텍스트로 (jq를 사용하지 않고 직접 처리)
          FILES_LIST=$(echo "${{ steps.changed_files.outputs.files }}" | head -5 | sed 's/^/• /')
          if [ "$FILE_COUNT" -gt 5 ]; then
            FILES_EXTRA="\n... and $(($FILE_COUNT - 5)) more files"
          else
            FILES_EXTRA=""
          fi

          echo "Sending to Discord webhook..."
          echo "Webhook URL (first 50 chars): ${DISCORD_WEBHOOK:0:50}"
          echo "Status: $STATUS_EMOJI, Color: $COLOR"

          # Diff 요약 가져오기
          DIFF_SUMMARY="${{ steps.diff_summary.outputs.summary }}"

          # JSON payload를 jq로 생성 (안전한 방법)
          PAYLOAD=$(jq -n \
            --arg actor "${{ github.actor }}" \
            --arg icon "https://github.com/${{ github.actor }}.png" \
            --arg emoji "$STATUS_EMOJI" \
            --arg title "${{ github.event.pull_request.title }}" \
            --arg base "${{ github.event.pull_request.base.ref }}" \
            --arg head "${{ github.event.pull_request.head.ref }}" \
            --argjson color "$COLOR" \
            --arg filecount "$FILE_COUNT" \
            --arg lint "$LINT_STATUS" \
            --arg build "$BUILD_STATUS" \
            --arg files "$FILES_LIST$FILES_EXTRA" \
            --arg diff "$DIFF_SUMMARY" \
            --arg url "${{ github.event.pull_request.html_url }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
            '{
              embeds: [{
                author: {
                  name: $actor,
                  icon_url: $icon
                },
                title: "\($emoji) Pull Request: \($title)",
                description: "**Target Branch:** `\($base)` ← `\($head)`",
                color: $color,
                fields: [
                  {
                    name: "📊 Changes",
                    value: "\($filecount) files changed",
                    inline: true
                  },
                  {
                    name: "Lint",
                    value: $lint,
                    inline: true
                  },
                  {
                    name: "Build",
                    value: $build,
                    inline: true
                  },
                  {
                    name: "📝 Changed Files",
                    value: $files
                  },
                  {
                    name: "🔍 Code Changes",
                    value: $diff
                  }
                ],
                footer: {
                  text: "Web Playground PR Review"
                },
                url: $url,
                timestamp: $timestamp
              }]
            }')

          HTTP_CODE=$(curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -o /tmp/discord_response.txt \
            -w "%{http_code}" \
            -s \
            -d "$PAYLOAD")

          echo "Discord API Response Code: $HTTP_CODE"

          if [ -f /tmp/discord_response.txt ]; then
            echo "Response body:"
            cat /tmp/discord_response.txt
          fi

          if [ "$HTTP_CODE" = "204" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Successfully sent notification to Discord!"
          else
            echo "❌ Error: Discord webhook returned status code $HTTP_CODE"
            exit 1
          fi
