name: Main Release Flow

on:
  push:
    branches: [main-test]

env:
  NODE_ENV: production
  NODE_VERSION: 22
  PNPM_VERSION: 10
  USER_NAME: jaemin96
  USER_EMAIL: lemon__96@naver.com

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore root node_modules cache
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-root-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure Git user
        run: |
          git config user.name "${{ env.USER_NAME }}"
          git config user.email "${{ env.USER_EMAIL }}"

      - name: Tag Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag -a "v$VERSION" -m "Release $VERSION"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/jaemin96/Coduplex.git
          git push origin --tags

      - name: GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: "v$VERSION"
